<header class="site-header">
  <div class="header-bar">
    <a class="brand" href="{{ site.Home.RelPermalink }}">
      <span class="brand-title">{{ site.Title }}</span>
      <span class="brand-tagline">{{ site.Params.tagline }}</span>
    </a>
    <nav class="main-nav" aria-label="Primary">
      <ul>
        {{ range site.Menus.main }}
          <li>
            <a href="{{ .URL }}" {{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}aria-current="page"{{ end }}>{{ .Name }}</a>
          </li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
